<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AstroMath | Multiplicador Galáctico</title>
    <link rel="stylesheet" href="multiplicacion.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="stars"></div>

  <header>
    <div class="logo">
      <div class="planet-icon"></div>
      <span class="logo-text">ASTRO<span class="logo-accent">MATH</span></span>
    </div>
    <h1>TUS <span class="accent"> TABLAS DE MULTIPLICAR</span></h1>
    <p class="sub">Ingresa un valor en segundos tendrás el resultado del 1 al 12</p>
  </header>

  <main>
    <div class="mission-control">
      <div class="input-group">
        <label for="numeroInput">INGRESA TU VALOR (1-100)</label>
        <input type="number" id="numeroInput" class="input-space" placeholder="00" min="1" max="100" />
      </div>
      <button class="btn-launch" onclick="generarTablas()">
        BOTÓN DE LANZAMIENTO
      </button>
    </div>

    <div class="display-panel" id="contenedorTabla">
      <div class="placeholder">
        <div class="radar"></div>
        <p>ESPERANDO COORDENADAS...</p>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Misión EduKSolution | Powered: David Atti</p>
  </footer>

  <script src="multiplicacion.js"></script>
</body>
</html>
